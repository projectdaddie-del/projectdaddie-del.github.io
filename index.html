<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTO Tracker</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Google AdSense:
       Paste your AdSense script here later.
       Example:
       <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=YOUR_CLIENT_ID"
               crossorigin="anonymous"></script>
  -->

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8956330383333569"
     crossorigin="anonymous"></script>
</head>
<body>
  <div class="app" id="appRoot">
    <header class="header">PTO TRACKER</header>

    <section class="controls">
      <div class="control">
        <label for="dailyHours">Hours work per day:</label>
        <input id="dailyHours" type="number" step="0.01" value="8" />
        <span class="suffix">h.</span>
      </div>

      <div class="control">
        <label for="periodHours">Hours work per pay period:</label>
        <input id="periodHours" type="number" step="0.01" value="80" />
        <span class="suffix">h.</span>
      </div>

      <div class="control">
        <label for="ptoRate">PTO Rate:</label>
        <input id="ptoRate" type="number" step="0.0001" value="0.1234" />
        <span class="suffix">/h</span>
      </div>

      <div class="control">
        <label for="currentBalance">Current PTO Balance:</label>
        <input id="currentBalance" class="balance-input" type="number" step="0.01" value="56.79" />
        <span class="suffix">h</span>
      </div>

      <div class="control range-control">
        <span class="range-label">Current Pay Period</span>

        <select id="startMonth"></select>
        <select id="startDay"></select>
        <select id="startYear"></select>

        <span class="range-sep">to</span>

        <select id="endMonth"></select>
        <select id="endDay"></select>
        <select id="endYear"></select>
      </div>
    </section>

    <section class="calendar-section">
      <div class="calendar-topbar">
        <button id="prevMonth" class="nav-btn" aria-label="Previous month">&#8249;</button>
        <div id="monthTitle" class="month-title"></div>
        <button id="nextMonth" class="nav-btn" aria-label="Next month">&#8250;</button>
      </div>

      <div id="calendarGrid" class="calendar-grid"></div>
    </section>

    <section class="footer-section" id="footerSection">
      <button id="premiumBtn" class="premium-btn">Remove Ads (Premium $7.99)</button>

      <div id="adsArea" class="ads-area">
        Advertisement | Ads Area
      </div>

      <!-- Optional AdSense display unit area
      <div class="adsense-slot">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="YOUR_CLIENT_ID"
             data-ad-slot="YOUR_SLOT_ID"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
      </div>
      -->
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
